<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <script>try{if(localStorage.getItem('cv-dark')==='false'){document.documentElement.className='light'}}catch{}</script>
  <title>CloudVault — 登录</title>
  <script>try{var _b=JSON.parse(document.getElementById('branding-data')?.textContent||'{}');if(_b.siteName)document.title=_b.siteName+' — 登录'}catch{}</script>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="//cdn.tailwindcss.com">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { accent: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-shell public-page" style="background:var(--bg-primary);color:var(--text-primary)">
  <div class="public-shell">
    <header class="public-topbar">
      <div class="public-topbar-inner">
        <div class="public-brand">
          <div id="brand-icon" class="public-brand-mark">
            <svg class="w-5 h-5 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z"/>
            </svg>
          </div>
          <div class="public-brand-copy">
            <span id="brand-name" class="public-brand-title">CloudVault</span>
            <span class="public-brand-subtitle">后台登录</span>
          </div>
        </div>
        <span class="public-kicker">安全访问</span>
      </div>
    </header>

    <main class="public-main flex items-center justify-center min-h-[calc(100dvh-108px)]">
      <div class="auth-wrap fade-up">
        <section class="surface-card auth-panel">
          <div class="auth-copy">
            <span class="public-kicker">管理员入口</span>
            <h1 class="auth-title">进入你的文件控制台</h1>
          </div>

          <form id="login-form">
            <div id="error-box" class="auth-error hidden"></div>

            <div class="mb-4">
              <label for="password" class="block text-sm font-medium mb-2" style="color:var(--text-secondary)">密码</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="请输入管理员密码"
                required
                autofocus
                class="w-full px-4 py-3 text-base"
              >
            </div>

            <button
              type="submit"
              id="submit-btn"
              class="btn-primary w-full text-base"
            >
              <span id="btn-text">登录</span>
              <svg id="btn-spinner" class="hidden spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            </button>

            <div class="auth-helper">
              <svg class="w-4 h-4 flex-shrink-0 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m6 2.25a9 9 0 11-18 0 9 9 0 0118 0Z"/>
              </svg>
              <span>认证成功后会直接进入文件管理后台。</span>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function() {
      try {
        var b = JSON.parse(document.getElementById('branding-data')?.textContent || '{}');
        if (b.siteName) document.getElementById('brand-name').textContent = b.siteName;
        if (b.siteIconUrl) {
          var iconEl = document.getElementById('brand-icon');
          iconEl.innerHTML = '<img src="' + b.siteIconUrl + '" class="w-full h-full object-contain">';
        }
      } catch {}
    })();

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      submitBtn.disabled = true;
      btnText.textContent = '登录中...';
      btnSpinner.classList.remove('hidden');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(new FormData(form)),
          credentials: 'same-origin',
          redirect: 'follow',
        });

        if (res.redirected) {
          window.location.href = res.url;
          return;
        }

        if (res.ok) {
          window.location.href = '/admin';
          return;
        }

        const data = await res.json().catch(() => ({ error: '密码错误' }));
        errorBox.textContent = data.error || '密码错误';
        errorBox.classList.remove('hidden');
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 500);
      } catch {
        errorBox.textContent = '连接错误，请重试。';
        errorBox.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = '登录';
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
